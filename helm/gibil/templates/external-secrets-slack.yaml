apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: gibil-slack
  labels: {{ $.Values.labels }}
  annotations:
    timestamp: {{ now | date "2006-01-02T15:04:05" }}
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: SecretStore
    name: {{ $.Release.Namespace }}
  target:
    name: gibil-slack
    creationPolicy: Owner
  data:
    - secretKey: SLACK_URL
      remoteRef:
        key: SLACK_URL

---